<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numismatic Auction Parser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --surface: #0f0f1a;
    --surface2: #13132a;
    --border: #1e1e3a;
    --border2: #2a2a4a;
    --text: #e8e8ff;
    --muted: #666;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #1dd1a1;
    --yellow: #ffd32a;
    --red: #ff6b6b;
    --orange: #ff9f43;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 48px; }
  .header .eyebrow {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .header .eyebrow::before,
  .header .eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #e8e8ff 30%, #a29bfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }

  /* API KEY SECTION */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .api-section label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
  .api-section input {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-section input:focus { border-color: var(--accent); }
  .api-status {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .api-status.ok { background: #0a2a1a; color: var(--green); border: 1px solid #1dd1a133; }
  .api-status.missing { background: #2a1a0a; color: var(--orange); border: 1px solid #ff9f4333; }

  /* EXAMPLES */
  .examples-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .example-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: #a0a0cc;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-btn:hover { border-color: var(--accent); color: var(--text); }

  /* TEXTAREA */
  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 18px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #333; }

  /* BUTTON */
  .parse-btn {
    width: 100%;
    margin-top: 12px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .parse-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px #6c5ce733; }
  .parse-btn:disabled { background: var(--surface2); color: #444; cursor: not-allowed; transform: none; box-shadow: none; }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #ffffff33;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ERROR */
  .error {
    margin-top: 16px;
    background: #1a0a0a;
    border: 1px solid #ff6b6b44;
    border-radius: 10px;
    padding: 16px;
    color: #ff9f9f;
    font-size: 13px;
    line-height: 1.6;
  }

  /* RESULT */
  .result { margin-top: 28px; animation: fadeIn 0.4s ease; }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .result-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .toggle-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--accent); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .card-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .denomination { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .authority { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); }

  /* CONDITION BOX */
  .condition-box {
    border-radius: 10px;
    padding: 14px 18px;
    text-align: center;
    min-width: 90px;
    flex-shrink: 0;
  }
  .condition-grade { font-size: 26px; font-weight: 900; font-family: 'Courier Prime', monospace; }
  .condition-name { font-size: 10px; opacity: 0.8; margin-top: 3px; }
  .sheldon-bar { margin-top: 10px; }
  .sheldon-label { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; }
  .sheldon-track { background: #1a1a2e; border-radius: 4px; height: 5px; overflow: hidden; }
  .sheldon-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

  /* SECTION LABEL */
  .section-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }

  /* CATALOG REFS */
  .refs { display: flex; flex-wrap: wrap; gap: 8px; }
  .ref-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .conf-dot { font-size: 10px; opacity: 0.7; }

  /* PRICES */
  .prices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .price-box { background: var(--surface2); border-radius: 10px; padding: 16px; }
  .price-value { font-size: 24px; font-weight: 800; font-family: 'Courier Prime', monospace; margin-top: 6px; }
  .price-note { color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* META CHIPS */
  .meta { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { background: var(--surface2); border-radius: 8px; padding: 8px 14px; }
  .chip-label { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .chip-value { color: #c8c8e8; font-size: 13px; font-weight: 600; margin-top: 3px; }

  /* NOTES */
  .notes-box {
    background: #1a1a0a;
    border: 1px solid #3a3a1022;
    border-radius: 10px;
    padding: 14px;
    color: #c8c8a8;
    font-size: 13px;
    line-height: 1.7;
  }

  /* WARNINGS */
  .warnings {
    background: #1a0a0a;
    border: 1px solid #ff6b6b22;
    border-radius: 10px;
    padding: 14px;
  }
  .warnings-title { color: var(--red); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .warning-item { color: #ff9f9f; font-size: 12px; margin-bottom: 5px; line-height: 1.5; }

  /* RAW JSON */
  .raw-json {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 22px;
    font-size: 12px;
    color: #a0a0cc;
    overflow: auto;
    line-height: 1.7;
    font-family: 'Courier Prime', monospace;
    max-height: 600px;
  }

  /* HISTORY */
  .history { margin-top: 40px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .history-title { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
  .clear-btn {
    background: none; border: 1px solid #ff6b6b33;
    color: #ff6b6b88; border-radius: 4px; padding: 4px 10px;
    font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .clear-btn:hover { color: var(--red); border-color: var(--red); }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item-left { display: flex; flex-direction: column; gap: 4px; }
  .history-item-authority { font-size: 14px; font-weight: 600; }
  .history-item-refs { color: var(--muted); font-size: 12px; font-family: 'Courier Prime', monospace; }
  .history-item-price { font-family: 'Courier Prime', monospace; font-weight: 700; font-size: 16px; color: var(--green); }

  /* FOOTER */
  .footer { text-align: center; color: #222; font-size: 11px; margin-top: 60px; }

  @media (max-width: 500px) {
    .prices { grid-template-columns: 1fr; }
    .card-header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="eyebrow">Numismatic Intelligence</div>
    <h1>Auction Parser</h1>
    <p>Incolla la descrizione di un lotto d'asta. L'AI estrae riferimenti catalografici, condizioni e prezzi — RRC · RIC · RPC e altri.</p>
  </div>

  <!-- API KEY -->
  <div class="api-section">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." oninput="updateApiStatus()" />
    <div class="api-status missing" id="apiStatus">Chiave mancante</div>
  </div>

  <!-- EXAMPLES -->
  <div class="examples-label">Esempi rapidi</div>
  <div class="examples">
    <button class="example-btn" onclick="loadExample(0)">Denario RRC</button>
    <button class="example-btn" onclick="loadExample(1)">Antoniniano RIC</button>
    <button class="example-btn" onclick="loadExample(2)">AE Provinciale RPC</button>
  </div>

  <!-- INPUT -->
  <textarea id="lotInput" placeholder="Incolla qui la descrizione del lotto d'asta (inglese, italiano, tedesco, francese)..."></textarea>
  <button class="parse-btn" id="parseBtn" onclick="parseLot()">Analizza Lotto →</button>

  <div id="errorBox" class="error" style="display:none"></div>
  <div id="resultBox" class="result" style="display:none"></div>

  <!-- HISTORY -->
  <div class="history" id="historySection" style="display:none">
    <div class="history-header">
      <div class="history-title">Lotti analizzati in questa sessione</div>
      <button class="clear-btn" onclick="clearHistory()">Cancella</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="footer">MVP · Numismatic Auction Parser · RRC · RIC · RPC</div>
</div>

<script>
const EXAMPLES = [
  `Lot 127. Julius Caesar. Denarius, military mint moving with Caesar 49-48 BC. AR (g 3.97; mm 18; h 6). Elephant r., trampling on serpent; in exergue, CAESAR, Rv. Pontifical implements: simpulum, aspergillum, securis and apex. Crawford 443/1; Sydenham 1006; RSC 49. Good Very Fine. Estimate: EUR 800-1,200. Hammer: EUR 1,400. Auction House: Numismatica Ars Classica, March 2023.`,
  `GALLIENUS (253-268). Antoninianus. Rome. Obv: GALLIENVS AVG. Radiate head right. Rev: DIANAE CONS AVG. Antelope walking right; X in exergue. RIC V 176. Cohen 160. Good VF/EF, attractive silvering. Weight: 3.21g, 22mm. Lot 445. Estimate $150-250. Sold for $380.`,
  `Lotto 88 - AUGUSTO. AE As provinciale, Caesaraugusta (Hispania Citerior), 27 a.C.-14 d.C. RPC I, 314. Busto laureato a destra / Toro stante a destra. BB/SPL. g 12,45. Stima € 200. Venduto € 320 (diritti esclusi). Baldwins, 15/11/2022.`
];

const SYSTEM_PROMPT = `Sei un esperto di numismatica antica specializzato in monete romane. Analizza la descrizione di un lotto d'asta e restituisci SOLO un oggetto JSON valido, senza markdown, senza backtick, senza testo aggiuntivo.

Estrai:
{
  "catalog_references": [{"system": "RRC"|"RIC"|"RPC"|"BMC"|"SNG"|"altro", "number": "numero esatto", "confidence": "high"|"medium"|"low"}],
  "denomination": "es. Denarius",
  "authority": "magistrato o imperatore",
  "date_range": "es. 49 a.C.",
  "condition": {
    "raw_text": "testo originale",
    "normalized": "P"|"F"|"VG"|"Fine"|"VF"|"EF"|"MS",
    "normalized_label": "Poor|Fair|Very Good|Fine|Very Fine|Extremely Fine|Mint State",
    "numeric_score": numero 1-70,
    "confidence": "high"|"medium"|"low"
  },
  "hammer_price": {"amount": numero|null, "currency": "EUR"|"USD"|"GBP"|"CHF"|null, "includes_fees": true|false|null},
  "estimate": {"low": numero|null, "high": numero|null, "currency": "EUR"|"USD"|"GBP"|"CHF"|null},
  "auction_house": "nome|null",
  "auction_date": "YYYY-MM|null",
  "lot_number": "numero|null",
  "weight_g": numero|null,
  "diameter_mm": numero|null,
  "notes": "note rilevanti|null",
  "parsing_warnings": ["lista ambiguità"]
}

Interpreta: VF=Very Fine, EF/aEF=Extremely Fine, FDC/MS=Mint State, BB=Very Fine, SPL=Extremely Fine, qFDC=about MS. Se mancante usa null.`;

const CONDITION_STYLES = {
  P:    { bg: "#4a1010", color: "#ff6b6b" },
  F:    { bg: "#4a2a10", color: "#ff9f43" },
  VG:   { bg: "#4a3a10", color: "#ffd32a" },
  Fine: { bg: "#2a4a10", color: "#a3cb38" },
  VF:   { bg: "#10402a", color: "#1dd1a1" },
  EF:   { bg: "#10304a", color: "#54a0ff" },
  MS:   { bg: "#2a104a", color: "#a29bfe" },
};

const REF_COLORS = { RRC: "#e17055", RIC: "#0984e3", RPC: "#6c5ce7", BMC: "#00b894", SNG: "#fdcb6e", altro: "#636e72" };
const CONF_ICONS = { high: "●", medium: "◐", low: "○" };

let sessionHistory = [];
let showRaw = false;
let lastResult = null;

function loadExample(i) { document.getElementById('lotInput').value = EXAMPLES[i]; }

function updateApiStatus() {
  const key = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiStatus');
  if (key.length > 10) {
    el.textContent = '✓ Chiave inserita';
    el.className = 'api-status ok';
  } else {
    el.textContent = 'Chiave mancante';
    el.className = 'api-status missing';
  }
}

async function parseLot() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const input = document.getElementById('lotInput').value.trim();
  const btn = document.getElementById('parseBtn');
  const errorBox = document.getElementById('errorBox');
  const resultBox = document.getElementById('resultBox');

  errorBox.style.display = 'none';
  resultBox.style.display = 'none';

  if (!apiKey || apiKey.length < 10) {
    showError('Inserisci una chiave API Gemini valida nel campo in alto.');
    return;
  }
  if (!input) { showError('Incolla prima la descrizione del lotto.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analisi in corso...';

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{ text: SYSTEM_PROMPT + '\n\nLotto da analizzare:\n\n' + input }]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 1500 }
        })
      }
    );

    const data = await res.json();

    if (data.error) {
      showError(`Errore API Gemini: ${data.error.message}`);
      return;
    }

    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Nessun JSON trovato nella risposta');

    const parsed = JSON.parse(match[0]);
    lastResult = parsed;
    addToHistory(parsed, input);
    renderResult(parsed);

  } catch (e) {
    showError(`Errore: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analizza Lotto →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderResult(data) {
  showRaw = false;
  const box = document.getElementById('resultBox');
  box.style.display = 'block';
  box.innerHTML = buildResultHTML(data);
}

function toggleRaw() {
  showRaw = !showRaw;
  document.getElementById('resultBox').innerHTML = buildResultHTML(lastResult);
}

function buildResultHTML(data) {
  const cond = CONDITION_STYLES[data.condition?.normalized] || CONDITION_STYLES.VF;
  const sheldonPct = data.condition?.numeric_score ? (data.condition.numeric_score / 70 * 100) : 0;

  const refs = (data.catalog_references || []).map(r =>
    `<span class="ref-badge" style="background:${REF_COLORS[r.system]||REF_COLORS.altro}">
      ${r.system} ${r.number}
      <span class="conf-dot">${CONF_ICONS[r.confidence]||''}</span>
    </span>`
  ).join('');

  const hammer = data.hammer_price?.amount
    ? `<div class="price-value" style="color:#1dd1a1">${data.hammer_price.amount.toLocaleString('it-IT')} ${data.hammer_price.currency||''}</div>
       <div class="price-note">${data.hammer_price.includes_fees === true ? 'commissioni incluse' : data.hammer_price.includes_fees === false ? 'escluse commissioni' : ''}</div>`
    : `<div style="color:#333;font-size:14px;margin-top:6px">Non rilevato</div>`;

  const estimate = (data.estimate?.low || data.estimate?.high)
    ? `<div class="price-value" style="color:#ffd32a;font-size:18px">
        ${data.estimate.low?.toLocaleString('it-IT')||'?'} – ${data.estimate.high?.toLocaleString('it-IT')||'?'} ${data.estimate.currency||''}
       </div>`
    : `<div style="color:#333;font-size:14px;margin-top:6px">Non rilevata</div>`;

  const metaItems = [
    { label: "Casa d'aste", value: data.auction_house },
    { label: "Data", value: data.auction_date },
    { label: "Lotto", value: data.lot_number ? `#${data.lot_number}` : null },
    { label: "Peso", value: data.weight_g ? `${data.weight_g}g` : null },
    { label: "Diametro", value: data.diameter_mm ? `${data.diameter_mm}mm` : null },
  ].filter(x => x.value).map(x =>
    `<div class="chip"><div class="chip-label">${x.label}</div><div class="chip-value">${x.value}</div></div>`
  ).join('');

  const notes = data.notes
    ? `<div><div class="section-label">Note</div><div class="notes-box">${data.notes}</div></div>`
    : '';

  const warnings = data.parsing_warnings?.length
    ? `<div class="warnings">
        <div class="warnings-title">⚠ Richiede verifica umana</div>
        ${data.parsing_warnings.map(w => `<div class="warning-item">· ${w}</div>`).join('')}
       </div>`
    : '';

  if (showRaw) {
    return `
      <div class="result-header">
        <div class="result-label">JSON Raw</div>
        <button class="toggle-btn" onclick="toggleRaw()">Vista card</button>
      </div>
      <pre class="raw-json">${JSON.stringify(data, null, 2)}</pre>`;
  }

  return `
    <div class="result-header">
      <div class="result-label">Risultato</div>
      <button class="toggle-btn" onclick="toggleRaw()">JSON raw</button>
    </div>
    <div class="card">
      <div class="card-header">
        <div>
          <div class="denomination">${data.denomination||'—'} · ${data.date_range||'—'}</div>
          <div class="authority">${data.authority||'Autorità sconosciuta'}</div>
        </div>
        ${data.condition?.normalized ? `
        <div class="condition-box" style="background:${cond.bg};border:1px solid ${cond.color}22">
          <div class="condition-grade" style="color:${cond.color}">${data.condition.normalized}</div>
          <div class="condition-name" style="color:${cond.color}">${data.condition.normalized_label||''}</div>
          ${data.condition.numeric_score ? `
          <div class="sheldon-bar">
            <div class="sheldon-label"><span>Sheldon</span><span style="color:${cond.color}">${data.condition.numeric_score}/70</span></div>
            <div class="sheldon-track"><div class="sheldon-fill" style="width:${sheldonPct}%;background:linear-gradient(90deg,#1a1a3a,${cond.color})"></div></div>
          </div>` : ''}
        </div>` : ''}
      </div>

      ${refs ? `<div><div class="section-label">Riferimenti Catalografici</div><div class="refs">${refs}</div></div>` : ''}

      <div class="prices">
        <div class="price-box">
          <div class="section-label">Hammer Price</div>
          ${hammer}
        </div>
        <div class="price-box">
          <div class="section-label">Stima</div>
          ${estimate}
        </div>
      </div>

      ${metaItems ? `<div class="meta">${metaItems}</div>` : ''}
      ${notes}
      ${warnings}
    </div>`;
}

function addToHistory(data, originalText) {
  sessionHistory.unshift({ data, originalText, ts: new Date() });
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!sessionHistory.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  list.innerHTML = sessionHistory.map((item, i) => {
    const refs = (item.data.catalog_references||[]).map(r => `${r.system} ${r.number}`).join(' · ') || '—';
    const price = item.data.hammer_price?.amount
      ? `${item.data.hammer_price.amount.toLocaleString('it-IT')} ${item.data.hammer_price.currency||''}`
      : '—';
    return `
      <div class="history-item" onclick="restoreHistoryItem(${i})">
        <div class="history-item-left">
          <div class="history-item-authority">${item.data.authority||'Sconosciuto'} · ${item.data.denomination||'—'}</div>
          <div class="history-item-refs">${refs}</div>
        </div>
        <div class="history-item-price">${price}</div>
      </div>`;
  }).join('');
}

function restoreHistoryItem(i) {
  const item = sessionHistory[i];
  document.getElementById('lotInput').value = item.originalText;
  lastResult = item.data;
  renderResult(item.data);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearHistory() {
  sessionHistory = [];
  renderHistory();
}
</script>
</body>
</html>
